name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Public demo IP for mytasco.engrammic.ai
  DEFAULT_VM_HOST: 136.116.136.145

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build web
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build
      - name: Install gateway deps
        run: npm --prefix services/gateway install --omit=dev
      - name: Build Gateway Docker image
        run: docker build -t mytasco-gateway:${{ github.sha }} ./services/gateway

  # Ships gateway without GCP / Pulumi — only needs VM_SSH_KEY
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web dist for Caddy
        continue-on-error: true
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build

      - name: Deploy gateway to VM over SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY:-}" ]; then
            echo "Missing GitHub secret VM_SSH_KEY" >&2
            exit 1
          fi
          printf '%s\n' "$VM_SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh-keygen -y -f /tmp/ssh_key >/dev/null

          VM_IP="${VM_HOST:-$DEFAULT_VM_HOST}"
          echo "Deploying to ubuntu@$VM_IP"

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i /tmp/ssh_key ubuntu@"$VM_IP" \
            "mkdir -p /opt/mytasco/apps/web"

          if [ -d apps/web/dist ]; then
            scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r apps/web/dist \
              ubuntu@"$VM_IP":/opt/mytasco/apps/web/ || echo "web dist sync skipped"
          fi

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i /tmp/ssh_key ubuntu@"$VM_IP" bash -s << 'EOF'
            set -euo pipefail
            cd /opt/mytasco
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker build -t mytasco-gateway:latest ./services/gateway
            docker compose -f docker-compose.prod.yml up -d --force-recreate gateway
            if [ -d apps/web/dist ]; then
              docker compose -f docker-compose.prod.yml up -d --force-recreate caddy || true
            fi
            docker compose -f docker-compose.prod.yml ps
            echo "--- health ---"
            curl -sf http://127.0.0.1:8790/health || true
            echo
            echo "--- routes check ---"
            curl -sf -o /dev/null -w "departments_unauth=%{http_code}\n" http://127.0.0.1:8790/departments || true
          EOF
