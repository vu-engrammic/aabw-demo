name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1

jobs:
  # PR / push sanity check — does not block VM deploy
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build web
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build
      - name: Install gateway deps
        run: npm --prefix services/gateway ci
      - name: Build Gateway Docker image
        run: docker build -t mytasco-gateway:${{ github.sha }} ./services/gateway

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Do not needs: build — prior npm ci failures blocked shipping forever
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web dist for Caddy
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy gateway + web to VM
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "$VM_SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          if [ -n "${VM_HOST:-}" ]; then
            VM_IP="$VM_HOST"
          else
            # Fallback: resolve via Pulumi when VM_HOST secret is unset
            cd infra
            npm ci
            pulumi stack select prod
            VM_IP=$(pulumi stack output vmIp)
            cd ..
          fi
          echo "Deploying to $VM_IP"

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ubuntu@"$VM_IP" \
            "mkdir -p /opt/mytasco/apps/web"

          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r apps/web/dist \
            ubuntu@"$VM_IP":/opt/mytasco/apps/web/

          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ubuntu@"$VM_IP" << 'EOF'
            set -euo pipefail
            cd /opt/mytasco
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker build -t mytasco-gateway:latest ./services/gateway
            docker compose -f docker-compose.prod.yml up -d --force-recreate gateway caddy
            docker compose -f docker-compose.prod.yml ps
          EOF
