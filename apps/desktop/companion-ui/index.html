<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Engrammic · Org Memory</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>window.__ENGRAMMIC_EMBEDDED__ = location.port === "8793";</script>
    <div id="login" class="login-shell">
      <div class="login-card">
        <img class="brand-logo" src="logo.png" alt="Engrammic" width="140" height="56" />
        <h1>Org Memory</h1>
        <p class="lede muted">Loading…</p>
      </div>
    </div>
    <div id="app" class="app hidden"></div>
    <script>
      window.onerror = function (msg, _src, _line, _col, err) {
        var root = document.getElementById("login");
        if (!root) return;
        root.classList.remove("hidden");
        document.getElementById("app")?.classList.add("hidden");
        root.innerHTML =
          '<div class="login-card"><p class="eyebrow">Engrammic</p><h1>UI error</h1><p class="lede muted">' +
          (err && err.message ? err.message : msg) +
          "</p></div>";
      };
    </script>
    <script src="graph-layout.js"></script>
    <script src="app.js"></script>
  </body>
</html>
